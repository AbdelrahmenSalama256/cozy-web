<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل دخول</title>

    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <div class="login-page">
      <div class="custom-container container">
        <div class="auth-logo mt-4">
          <img src="./assets/img/logo.png" alt="Logo" />
        </div>
        <hr />
        <div class="auth-container">
          <div class="auth-illustration">
            <img src="assets/img/login.svg" alt="Login Illustration" />
          </div>
          <div class="auth-text">
            <h1>مرحبا بك مجددا</h1>
            <p>سجل الدخول و استكشف احدث العروض</p>
          </div>

          <form id="loginForm">
            <div class="mb-3">
              <label for="email" class="form-label">البريد الإلكتروني</label>
              <input type="email" class="form-control" id="email" required />
            </div>

            <div class="mb-3 position-relative">
              <label for="password" class="form-label">كلمة المرور</label>
              <input
                type="password"
                class="form-control"
                id="password"
                required
              />
              <span class="password-toggle" onclick="togglePassword()">
                <i class="far fa-eye"></i>
              </span>
            </div>
            <div class="row mb-3 align-items-center">
              <div class="col-lg-6">
                <div class="form-check">
                  <input
                    type="checkbox"
                    class="form-check-input"
                    id="saveCard"
                  />
                  <label class="form-check-label" for="saveCard">
                    تذكرني
                  </label>
                </div>
              </div>
              <div class="col-lg-6">
                <a href="#" class="password-link">هل نسيت كلمة السر؟</a>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">
              تسجيل دخول
            </button>

            <div class="auth-footer">
              <span>ليس لديك حساب؟</span>
              <a href="register.html" class="register-link">سجل الآن</a>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function togglePassword() {
        const passwordInput = document.getElementById("password");
        const toggleIcon = document.querySelector(".password-toggle i");

        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          toggleIcon.classList.remove("fa-eye");
          toggleIcon.classList.add("fa-eye-slash");
        } else {
          passwordInput.type = "password";
          toggleIcon.classList.remove("fa-eye-slash");
          toggleIcon.classList.add("fa-eye");
        }
      }

      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          // Add your login logic here
          console.log("Form submitted");
        });
    </script>
  </body>
</html>
